<?xml version="1.0" encoding="UTF-8"?>
<!-- Spirea Platform — Strategic Applications · D2 Rapid Deployment -->
<!-- D2 Brand System · © 2026 Spirea Platform · Transparent background -->
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 280 360" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Modular deployment — assembly sequence">
          <title>Rapid deployment — modular assembly sequence</title>
          <defs>
            <pattern id="t2" width="20" height="20" patternUnits="userSpaceOnUse">
              <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#B8B4AE" stroke-width="0.3"/>
            </pattern>
          </defs>
          <rect width="280" height="360" fill="#C5C2BC"/>
          <rect width="280" height="360" fill="url(#t2)"/>
          <!-- Module grid — axonometric language -->
          <rect x="30" y="50" width="50" height="70" fill="none" stroke="#9A9A98" stroke-width="0.8" rx="1"/>
          <rect x="85" y="50" width="50" height="70" fill="none" stroke="#9A9A98" stroke-width="0.8" rx="1"/>
          <rect x="140" y="50" width="50" height="70" fill="none" stroke="#9A9A98" stroke-width="0.8" rx="1"/>
          <rect x="195" y="50" width="55" height="70" fill="none" stroke="#9A9A98" stroke-width="0.8" rx="1"/>
          <rect x="30" y="130" width="50" height="70" fill="none" stroke="#9A9A98" stroke-width="0.8" rx="1"/>
          <rect x="85" y="130" width="50" height="70" fill="none" stroke="#9A9A98" stroke-width="0.8" rx="1"/>
          <rect x="140" y="130" width="50" height="70" fill="none" stroke="#9A9A98" stroke-width="0.8" rx="1"/>
          <rect x="195" y="130" width="55" height="70" fill="none" stroke="#9A9A98" stroke-width="0.8" rx="1"/>
          <!-- Teal accent on one module -->
          <rect x="30" y="50" width="2" height="70" fill="#1D9E75" opacity="0.6"/>
          <rect x="30" y="130" width="2" height="70" fill="#1D9E75" opacity="0.6"/>
          <!-- Dimension: module pitch -->
          <line x1="30" y1="225" x2="80" y2="225" stroke="#9A9A98" stroke-width="0.4"/>
          <line x1="30" y1="222" x2="30" y2="228" stroke="#9A9A98" stroke-width="0.4"/>
          <line x1="80" y1="222" x2="80" y2="228" stroke="#9A9A98" stroke-width="0.4"/>
          <text x="55" y="240" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="6.5" fill="#9A9A98" letter-spacing="1">Module</text>
          <!-- Assembly sequence arrows -->
          <line x1="60" y1="280" x2="100" y2="260" stroke="#B0ADA8" stroke-width="0.5"/>
          <line x1="110" y1="280" x2="145" y2="260" stroke="#B0ADA8" stroke-width="0.5"/>
          <line x1="160" y1="280" x2="190" y2="260" stroke="#B0ADA8" stroke-width="0.5"/>
          <!-- Title block -->
          <rect x="0" y="342" width="280" height="18" fill="#E0DDD8"/>
          <text x="10" y="353" font-family="DM Sans,sans-serif" font-size="6" fill="#9A9A98" letter-spacing="1.2" font-weight="300">RAPID DEPLOYMENT</text>
          <text x="270" y="353" text-anchor="end" font-family="DM Sans,sans-serif" font-size="6" fill="#C8C4B8" letter-spacing="0.8" font-weight="300">Assembly sequence</text>
        </svg>